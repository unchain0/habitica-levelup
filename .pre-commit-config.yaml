default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: ruff-check-fix
        name: ruff-check-fix
        entry: uv run ruff check --fix
        language: system
        stages: [pre-commit]
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        stages: [pre-commit]
        types: [python]
      - id: github-ci-parity
        name: github-ci-parity
        entry: bash scripts/run-ci-checks.sh pre-push
        language: system
        stages: [pre-push]
        types: [python]
        pass_filenames: false
        always_run: true
