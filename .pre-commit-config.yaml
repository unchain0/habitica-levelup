default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: github-ci-parity
        name: github-ci-parity
        entry: bash scripts/run-ci-checks.sh all
        language: system
        stages: [pre-push]
        types: [python]
        pass_filenames: false
        always_run: true
