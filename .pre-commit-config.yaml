repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: task format
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: ruff-lint
        name: ruff-lint
        entry: task lint
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: mypy
        name: mypy
        entry: task type-check
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: pytest-cov
        name: pytest-cov
        entry: task test-cov
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
